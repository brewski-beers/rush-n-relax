name: 'Firebase Auth Setup'
description: 'Write Firebase service account JSON to a secure key file and export ADC env'

inputs:
  service-account-json:
    description: 'Firebase service account JSON payload'
    required: true

outputs:
  credentials_path:
    description: 'Absolute path to generated credentials file'
    value: ${{ steps.auth.outputs.credentials_path }}

runs:
  using: composite
  steps:
    - name: Validate credentials input
      shell: bash
      run: |
        if [ -z "${{ inputs.service-account-json }}" ]; then
          echo "Missing deploy credentials. Set FIREBASE_SERVICE_ACCOUNT_RUSH_N_RELAX."
          exit 1
        fi

    - name: Write credentials and export ADC
      id: auth
      shell: bash
      run: |
        CREDENTIALS_PATH="$RUNNER_TEMP/gcloud-key.json"
        RAW_INPUT='${{ inputs.service-account-json }}'

        # Try raw JSON first.
        if printf '%s' "$RAW_INPUT" | node -e "
          const fs = require('fs');
          const raw = fs.readFileSync(0, 'utf8');
          const obj = JSON.parse(raw);
          if (!obj || obj.type !== 'service_account' || !obj.client_email || !obj.private_key) {
            process.exit(2);
          }
        " >/dev/null 2>&1; then
          printf '%s' "$RAW_INPUT" > "$CREDENTIALS_PATH"
        # Then try base64-encoded JSON.
        elif printf '%s' "$RAW_INPUT" | base64 --decode 2>/dev/null | node -e "
          const fs = require('fs');
          const raw = fs.readFileSync(0, 'utf8');
          const obj = JSON.parse(raw);
          if (!obj || obj.type !== 'service_account' || !obj.client_email || !obj.private_key) {
            process.exit(2);
          }
        " >/dev/null 2>&1; then
          printf '%s' "$RAW_INPUT" | base64 --decode > "$CREDENTIALS_PATH"
        else
          echo "::error::Invalid Firebase service account secret format. Expected raw JSON (or base64-encoded JSON) with type=service_account, client_email, and private_key."
          exit 1
        fi

        chmod 600 "$CREDENTIALS_PATH"
        echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDENTIALS_PATH" >> "$GITHUB_ENV"
        echo "credentials_path=$CREDENTIALS_PATH" >> "$GITHUB_OUTPUT"
