# Cleanup stale Firebase Hosting preview channels
# - Deletes old PR preview channels (pr-<number>) after retention window
# - Keeps live channel and recent previews intact
name: Firebase Preview Cleanup

on:
  schedule:
    - cron: '30 6 * * *' # 06:30 UTC daily
  workflow_dispatch:
    inputs:
      retention_days:
        description: 'Delete PR preview channels older than this many days'
        required: false
        default: '3'
        type: string

concurrency:
  group: firebase-preview-cleanup
  cancel-in-progress: true

jobs:
  cleanup:
    name: cleanup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FIREBASE_PROJECT_ID: rush-n-relax
      FIREBASE_DEPLOY_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RUSH_N_RELAX }}
      RETENTION_DAYS: ${{ github.event.inputs.retention_days || '3' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Validate cleanup credentials
        run: |
          if [ -z "$FIREBASE_DEPLOY_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing cleanup credentials. Set FIREBASE_SERVICE_ACCOUNT_RUSH_N_RELAX."
            exit 1
          fi

      - name: Write cleanup credentials
        run: |
          printf '%s' "$FIREBASE_DEPLOY_SERVICE_ACCOUNT_JSON" > $HOME/gcloud-key.json

      - name: Resolve stale preview channels
        id: stale
        run: |
          GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcloud-key.json \
          npx firebase-tools hosting:channel:list \
            --project "$FIREBASE_PROJECT_ID" \
            --json | node -e "
              const fs = require('fs');
              const payload = JSON.parse(fs.readFileSync(0, 'utf8'));
              const retentionDays = Number(process.env.RETENTION_DAYS || '3');
              if (!Number.isFinite(retentionDays) || retentionDays <= 0) {
                console.error('Invalid RETENTION_DAYS value:', process.env.RETENTION_DAYS);
                process.exit(1);
              }

              const now = Date.now();
              const cutoff = now - retentionDays * 24 * 60 * 60 * 1000;
              const channels = payload?.result?.channels || payload?.channels || [];

              const channelIdFromName = (name = '') => {
                const parts = String(name).split('/');
                return parts[parts.length - 1] || '';
              };

              const getChannelId = (channel) => channel.id || channel.channelId || channelIdFromName(channel.name);
              const getLastTimestamp = (channel) => {
                const candidates = [
                  channel.updateTime,
                  channel.lastReleaseTime,
                  channel.lastRelease?.releaseTime,
                  channel.lastRelease?.createTime,
                  channel.createTime,
                ].filter(Boolean);

                for (const value of candidates) {
                  const ts = Date.parse(value);
                  if (!Number.isNaN(ts)) return ts;
                }

                return null;
              };

              const staleIds = channels
                .map((channel) => {
                  const id = getChannelId(channel);
                  const lastTs = getLastTimestamp(channel);
                  return { id, lastTs };
                })
                .filter(({ id, lastTs }) => id && id.startsWith('pr-') && lastTs !== null && lastTs < cutoff)
                .map(({ id }) => id);

              fs.writeFileSync(process.env.RUNNER_TEMP + '/stale_channels.txt', staleIds.join('\n'));
              process.stdout.write(String(staleIds.length));
            " > $RUNNER_TEMP/stale_count.txt

          STALE_COUNT=$(cat "$RUNNER_TEMP/stale_count.txt")
          echo "stale_count=$STALE_COUNT" >> "$GITHUB_OUTPUT"

      - name: Delete stale preview channels
        if: steps.stale.outputs.stale_count != '0'
        run: |
          while IFS= read -r channel_id; do
            if [ -n "$channel_id" ]; then
              echo "Deleting stale preview channel: $channel_id"
              GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcloud-key.json \
              npx firebase-tools hosting:channel:delete "$channel_id" \
                --project "$FIREBASE_PROJECT_ID" \
                --force
            fi
          done < "$RUNNER_TEMP/stale_channels.txt"

      - name: Cleanup summary
        if: always()
        run: |
          {
            echo "## Firebase preview cleanup"
            echo "- Retention days: \`${RETENTION_DAYS}\`"
            echo "- Stale channels deleted: \`${{ steps.stale.outputs.stale_count }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup credentials
        if: always()
        run: rm -f $HOME/gcloud-key.json
