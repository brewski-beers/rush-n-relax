# Pull Request CI
# - `verify` job is the required status check for branch protection
# - `preview` job triggers an App Hosting preview rollout after tests pass
name: PR — Verify & Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

concurrency:
  group: pr-verify-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    uses: ./.github/workflows/release-changes-gate.yml

  verify:
    name: verify
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint
        if: needs.changes.outputs.should_run == 'true'
        run: npm run lint

      - name: Type check
        if: needs.changes.outputs.should_run == 'true'
        run: npx tsc --noEmit

      - name: Unit tests
        if: needs.changes.outputs.should_run == 'true'
        run: npm run test

      - name: Setup Playwright (Chromium)
        if: needs.changes.outputs.should_run == 'true'
        uses: ./.github/actions/setup-playwright
        with:
          browsers: chromium

      - name: E2E tests
        if: needs.changes.outputs.should_run == 'true'
        run: >-
          npx firebase-tools emulators:exec --project=rush-n-relax --only=firestore,storage
          "node scripts/seed-emulators.cjs && npm run test:e2e:core -- --project=chromium"
        env:
          VITE_USE_EMULATORS: 'true'
          CI: 'true'

      - name: No-op summary
        if: needs.changes.outputs.should_run != 'true'
        run: |
          {
            echo "## PR verify summary"
            echo "- No release-relevant changes detected."
            echo "- Skipping heavy verify steps."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload verify failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr-verify-failures
          path: test-results/
          if-no-files-found: ignore
          retention-days: 3

  preview:
    name: preview
    needs: [changes, verify]
    if: needs.changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FIREBASE_PREVIEW_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RUSH_N_RELAX }}
      FIREBASE_PROJECT_ID: rush-n-relax
      APP_HOSTING_BACKEND_ID: rush-n-relax
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Setup Firebase auth
        id: auth
        uses: ./.github/actions/firebase-auth-setup
        with:
          service-account-json: ${{ env.FIREBASE_PREVIEW_SERVICE_ACCOUNT_JSON }}

      - name: Create App Hosting preview rollout
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_path }}
        run: |
          npx firebase-tools apphosting:rollouts:create "$APP_HOSTING_BACKEND_ID" \
            --project "$FIREBASE_PROJECT_ID" \
            --git-branch "${{ github.head_ref }}" \
            --force \
            --non-interactive

      - name: Preview summary
        if: always()
        run: |
          {
            echo "## App Hosting preview rollout"
            echo "- Backend: \`${{ env.APP_HOSTING_BACKEND_ID }}\`"
            echo "- Branch: \`${{ github.head_ref }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup credentials
        if: always()
        run: rm -f "${{ steps.auth.outputs.credentials_path }}"
