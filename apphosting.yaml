# Firebase App Hosting configuration
# Replaces the GitHub Actions deploy pipeline.
# Deploy on push to main — no custom workflow needed.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Concurrent requests per instance
  concurrency: 80
  # Memory per instance
  cpu: 1
  memoryMiB: 512
  # Min instances to keep warm (avoids cold starts)
  minInstances: 0
  maxInstances: 10

buildConfig:
  # Tests run in GitHub Actions before triggering this rollout — no need to repeat here
  commands:
    - npm run build

# Environment variables exposed to the Next.js server at runtime.
# Client-side vars (NEXT_PUBLIC_*) are public and embedded at build time.
env:
  - variable: NODE_ENV
    value: production

  # Firebase project config (public — embedded in client bundle)
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyB0qrTVmQ8gRvmx-4oJ_dQHP6RA2kZ3FJk"

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "rush-n-relax.firebaseapp.com"

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "rush-n-relax"

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "rush-n-relax.firebasestorage.app"

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "556383052079"

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:556383052079:web:6780513e5d7d79140f01da"

  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: "G-MRCWGZC1F1"

  # Google Maps (public)
  - variable: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
    value: "AIzaSyAcUo58FHBrCWyWiqDh_mzauM17ptqX7xM"

